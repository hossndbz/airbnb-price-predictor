<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Airbnb 料金予測</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="{{ url_for('static', filename='style.css') }}"
    />
  </head>
  <body>
    <header>
      <div class="logo">airpredict<span>.</span></div>
      <div class="header-tag">Kaggle US Airbnb Open Data 対応</div>
    </header>

    <main>
      <div class="form-col">
        <!-- エリア -->
        <div class="card">
          <p class="section-title">エリア</p>
          <div class="grid2" style="margin-bottom: 10px">
            <div class="field">
              <label>都市 <span class="col-tag">city</span></label>
              <select id="city" onchange="autoGeocode()">
                {% for c in columns.city %}
                <option value="{{ c }}">{{ c }}</option>
                {% endfor %}
              </select>
            </div>
            <div class="field">
              <label
                >区・エリア群
                <span class="col-tag">neighbourhood_group</span></label
              >
              <select id="neighbourhood_group" onchange="autoGeocode()">
                <option value="">(なし)</option>
                {% for ng in columns.neighbourhood_group %}
                <option value="{{ ng }}">{{ ng }}</option>
                {% endfor %}
              </select>
            </div>
          </div>
          <div
            id="geo-status"
            style="
              font-size: 12px;
              color: var(--text-sub);
              min-height: 18px;
              margin-top: 6px;
            "
          ></div>
          <input type="hidden" id="latitude" value="37.7703" />
          <input type="hidden" id="longitude" value="-122.4332" />
        </div>

        <!-- 物件 -->
        <div class="card">
          <p class="section-title">物件</p>
          <div class="field">
            <label>部屋タイプ <span class="col-tag">room_type</span></label>
            <select id="room_type">
              {% for rt in columns.room_type %}
              <option value="{{ rt }}">{{ rt }}</option>
              {% endfor %}
            </select>
          </div>
        </div>

        <!-- 予約条件 -->
        <div class="card">
          <p class="section-title">予約条件</p>
          <div class="range-field">
            <div class="range-header">
              <label
                >最低泊数 <span class="col-tag">minimum_nights</span></label
              >
              <span id="min-nights-out">2</span>
            </div>
            <input
              type="range"
              id="minimum_nights"
              min="1"
              max="30"
              step="1"
              value="2"
              oninput="
                document.getElementById('min-nights-out').textContent =
                  this.value
              "
            />
          </div>
          <div class="range-field">
            <div class="range-header">
              <label
                >年間空き日数
                <span class="col-tag">availability_365</span></label
              >
              <span id="avail-out">128</span>
            </div>
            <input
              type="range"
              id="availability_365"
              min="0"
              max="365"
              step="1"
              value="128"
              oninput="
                document.getElementById('avail-out').textContent = this.value
              "
            />
          </div>
        </div>

        <!-- レビュー -->
        <div class="card">
          <p class="section-title">レビュー</p>
          <div class="range-field">
            <div class="range-header">
              <label
                >総レビュー数
                <span class="col-tag">number_of_reviews</span></label
              >
              <span id="reviews-out">50</span>
            </div>
            <input
              type="range"
              id="number_of_reviews"
              min="0"
              max="1000"
              step="1"
              value="50"
              oninput="
                document.getElementById('reviews-out').textContent = this.value
              "
            />
          </div>
          <div class="range-field">
            <div class="range-header">
              <label
                >直近12ヶ月のレビュー数
                <span class="col-tag">number_of_reviews_ltm</span></label
              >
              <span id="reviews-ltm-out">10</span>
            </div>
            <input
              type="range"
              id="number_of_reviews_ltm"
              min="0"
              max="200"
              step="1"
              value="10"
              oninput="
                document.getElementById('reviews-ltm-out').textContent =
                  this.value
              "
            />
          </div>
          <div class="range-field">
            <div class="range-header">
              <label
                >月あたりレビュー数
                <span class="col-tag">reviews_per_month</span></label
              >
              <span id="rpm-out">1.00</span>
            </div>
            <input
              type="range"
              id="reviews_per_month"
              min="0"
              max="20"
              step="0.01"
              value="1.00"
              oninput="
                document.getElementById('rpm-out').textContent = parseFloat(
                  this.value,
                ).toFixed(2)
              "
            />
          </div>
          <div class="divider"></div>
          <div class="field">
            <label
              >最終レビュー日 <span class="col-tag">last_review</span></label
            >
            <input
              type="text"
              id="last_review"
              value="2023-06-01"
              placeholder="YYYY-MM-DD"
            />
          </div>
        </div>

        <!-- ホスト -->
        <div class="card">
          <p class="section-title">ホスト</p>
          <div class="field">
            <label
              >ホスト掲載件数
              <span class="col-tag">calculated_host_listings_count</span></label
            >
            <input
              type="number"
              id="calculated_host_listings_count"
              value="1"
              min="1"
              max="500"
            />
          </div>
        </div>
      </div>

      <!-- Sidebar -->
      <div class="sidebar">
        <button class="predict-btn" id="predict-btn" onclick="runPredict()">
          料金を予測する →
        </button>

        <div class="result-card">
          <div class="result-idle" id="result-idle">
            条件を入力して予測を実行してください
          </div>
          <div id="result-body" style="display: none"></div>
        </div>
      </div>
    </main>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
  </body>
</html>
